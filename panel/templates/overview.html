{% extends "layout.html" %}
{% block title %}Overview – DNSTT Panel{% endblock %}
{% block page_title %}Overview{% endblock %}
{% block content %}
<section class="mb-8">
  <h2 class="text-base font-semibold text-slate-800 dark:text-slate-100 mb-3 border-b border-slate-200 dark:border-slate-600 pb-2">Overview</h2>
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-3">
    <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-600 p-3 sm:p-4 shadow-sm">
      <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider">CPU</p>
      <p class="text-lg sm:text-xl font-bold text-slate-800 dark:text-slate-100" id="overview-cpu">—</p>
    </div>
    <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-600 p-3 sm:p-4 shadow-sm">
      <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider">RAM</p>
      <p class="text-lg sm:text-xl font-bold text-slate-800 dark:text-slate-100" id="overview-ram">—</p>
    </div>
    <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-600 p-3 sm:p-4 shadow-sm">
      <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider">Disk</p>
      <p class="text-lg sm:text-xl font-bold text-slate-800 dark:text-slate-100" id="overview-disk">—</p>
    </div>
    <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-600 p-3 sm:p-4 shadow-sm">
      <p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider">Uptime</p>
      <p class="text-lg sm:text-xl font-bold text-slate-800 dark:text-slate-100" id="overview-uptime">—</p>
    </div>
  </div>
</section>
{% endblock %}
{% block page_script %}
<script>
(function() {
  function formatUptime(sec) {
    if (sec == null || sec < 0) return '—';
    var d = Math.floor(sec / 86400);
    var h = Math.floor((sec % 86400) / 3600);
    var m = Math.floor((sec % 3600) / 60);
    var parts = [];
    if (d) parts.push(d + 'd');
    if (h) parts.push(h + 'h');
    if (m || parts.length === 0) parts.push(m + 'm');
    return parts.join(' ');
  }
  function applyUsage(data) {
    document.getElementById('overview-cpu').textContent = data.cpu_percent + '%';
    document.getElementById('overview-ram').textContent = data.ram_percent + '%';
    document.getElementById('overview-disk').textContent = data.disk_percent + '%';
    document.getElementById('overview-uptime').textContent = formatUptime(data.uptime_seconds);
  }
  function poll() {
    fetch('{{ url_for("api_usage") }}').then(function(r) { return r.json(); }).then(applyUsage).catch(function() {}).finally(function() { setTimeout(poll, 2000); });
  }
  poll();
})();
</script>
{% endblock %}
